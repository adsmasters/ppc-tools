<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdsMasters PPC Tools</title>
    <style>
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --border: #30363d;
            --text-primary: #e6edf3; --text-secondary: #8b949e; --accent: #3551FF;
        }
        [data-theme="light"] {
            --bg-primary: #f5f5f5; --bg-secondary: #ffffff; --border: #e0e0e0;
            --text-primary: #1a1a1a; --text-secondary: #666666; --accent: #3551FF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; }
        .theme-toggle-corner { position: fixed; top: 16px; right: 16px; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 16px; line-height: 1; z-index: 100; }
        .theme-toggle-corner:hover { color: var(--text-primary); border-color: var(--text-secondary); }
        .login-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 380px; text-align: center; }
        .login-logo { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-logo span { color: var(--accent); }
        .login-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
        .login-input { width: 100%; padding: 12px 16px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; margin-bottom: 16px; }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .login-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .login-btn:hover { background: #2a41cc; }
        .login-error { color: #f85149; font-size: 13px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <button class="theme-toggle-corner" id="themeToggle" onclick="toggleTheme()">&#9788;</button>
    <div class="login-card">
        <div class="login-logo">Ads<span>Masters</span> PPC Tools</div>
        <p class="login-sub">Interne Amazon PPC Werkzeuge</p>
        <input type="password" class="login-input" id="pw" placeholder="Passwort eingeben..." autofocus>
        <button class="login-btn" id="loginBtn">Anmelden</button>
        <div class="login-error" id="loginError">Falsches Passwort</div>
    </div>
    <script>
        // Theme toggle
        const savedTheme = localStorage.getItem('ppc_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeToggle').innerHTML = savedTheme === 'light' ? '&#9790;' : '&#9788;';
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('ppc_theme', next);
            document.getElementById('themeToggle').innerHTML = next === 'light' ? '&#9790;' : '&#9788;';
        }
        if (sessionStorage.getItem('ppc_auth')) window.location.href = 'dashboard.html';
        document.getElementById('loginBtn').addEventListener('click', check);
        document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
        function check() {
            if (document.getElementById('pw').value === 'adsmasters2026') {
                sessionStorage.setItem('ppc_auth', '1');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
