<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdsMasters PPC Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px; width: 380px; text-align: center; }
        .login-logo { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-logo span { color: #3551FF; }
        .login-sub { font-size: 14px; color: #8b949e; margin-bottom: 28px; }
        .login-input { width: 100%; padding: 12px 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; margin-bottom: 16px; }
        .login-input:focus { outline: none; border-color: #3551FF; }
        .login-btn { width: 100%; padding: 12px; background: #3551FF; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .login-btn:hover { background: #2a41cc; }
        .login-error { color: #f85149; font-size: 13px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">Ads<span>Masters</span> PPC Tools</div>
        <p class="login-sub">Interne Amazon PPC Werkzeuge</p>
        <input type="password" class="login-input" id="pw" placeholder="Passwort eingeben..." autofocus>
        <button class="login-btn" id="loginBtn">Anmelden</button>
        <div class="login-error" id="loginError">Falsches Passwort</div>
    </div>
    <script>
        if (sessionStorage.getItem('ppc_auth')) window.location.href = 'dashboard.html';
        document.getElementById('loginBtn').addEventListener('click', check);
        document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
        function check() {
            if (document.getElementById('pw').value === 'adsmasters2026') {
                sessionStorage.setItem('ppc_auth', '1');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
    </script>
</body>
</html>
